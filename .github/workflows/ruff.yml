name: Ruff
on:
  push:
    paths:
      - 'src/cheznav/**'
      - 'tests/**'
      - 'pyproject.toml'
  pull_request:
    paths:
      - 'src/cheznav/**'
      - 'tests/**'
      - 'pyproject.toml'

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3
